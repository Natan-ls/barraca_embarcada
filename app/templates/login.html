{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-8 border border-gray-300 rounded-lg shadow-md">
    <div class="text-center mb-6">
        <h1 class="text-3xl font-extrabold text-indigo-700">Barraca Lanches</h1>
        <p class="text-gray-500 text-sm mt-1">Controle de Caixa</p>
    </div>

    {% if erro %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4 text-sm" role="alert">
        {{ erro }}
    </div>
    {% endif %}

    <!-- Ação do form atualizada para auth.login -->
    <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-4">
        <div>
            <label class="block text-gray-700 text-sm font-bold mb-1">Login:</label>
            <input type="text" name="login" required placeholder="Ex: admin"
                   class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
            <label class="block text-gray-700 text-sm font-bold mb-1">Senha:</label>
            <input type="password" name="senha" required placeholder="••••••••"
                   class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded transition duration-200">
            Entrar no Sistema
        </button>
    </form>
</div>
{% endblock %}
